  <!DOCTYPE html>
  <html lang="en" class="">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessMate - Registration Platform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#D96B43',
                hover: '#C55D37',
                disabled: '#EAA98F'
              }
            },
            fontFamily: {
              sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
  <body class="bg-[#FAF8F5] text-zinc-900 dark:bg-zinc-900 dark:text-zinc-100 min-h-screen font-sans transition-colors duration-300 flex flex-col">

    <div id="toast-notification-layer" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none transform transition-all duration-500 opacity-0 translate-y-[-20px]">
      <div class="bg-emerald-600 text-white font-semibold text-sm px-6 py-3.5 rounded-xl shadow-xl flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Registration Completed Successfully!</span>
      </div>
    </div>

    <div id="app" class="flex-1 flex flex-col"></div>

    <script>
      const state = {
        studentStep: 1, 
        generatedIndexNumber: "",
        formData: {
          fullName: "",
          email: "",
          password: "",
          department: "",
          year: "1st",
          yourPhone: "",
          parentPhone: "",
          dietPreference: "Veg",
          capturedPhoto: null,
          otpYourPhone: "",
          otpParentPhone: ""
        },
        steps: ["INFO", "PHOTO", "OTP", "PAYMENT", "DONE"],
        streamRef: null,
        isCameraActive: false 
      };

      function renderApp() {
        const container = document.getElementById('app');
        if (!container) return;

        const step = state.studentStep;
        
        let layoutHtml = `
          <header class="flex items-center justify-between px-6 py-4 border-b border-zinc-200/40 dark:border-zinc-800/60 bg-[#FAF8F5]/50 dark:bg-zinc-900/50 backdrop-blur-sm">
            

            <div class="text-xs font-medium text-zinc-400 dark:text-zinc-500">
              Step <span class="font-bold text-zinc-900 dark:text-white">${step}</span> / 5
            </div>

            <button id="theme-toggle" class="p-2.5 rounded-full transition-all duration-200 active:scale-95 border border-zinc-200 dark:border-zinc-800 bg-white text-zinc-700 hover:bg-zinc-100 dark:bg-zinc-800 dark:text-yellow-400 dark:hover:bg-zinc-700" aria-label="Toggle theme">
              <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V23M4.22 4.22l1.58 1.58m12.42 12.42l1.58 1.58M3 12h2.25m13.5 0H23M4.22 19.78l1.58-1.58M17.62 5.38l1.58-1.58M12 7.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z" />
              </svg>
              <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
              </svg>
            </button>
          </header>

          <main class="flex-1 flex flex-col items-center justify-center px-6 py-12 max-w-[540px] mx-auto w-full">
            <div class="w-full space-y-4 mb-8">
              <div class="grid grid-cols-5 gap-2">
                ${state.steps.map((s, idx) => `
                  <div class="h-1 rounded-full transition-colors duration-300 ${idx < step ? 'bg-brand' : 'bg-zinc-200 dark:bg-zinc-800'}"></div>
                `).join('')}
              </div>
              <div class="grid grid-cols-5 text-center text-[10px] tracking-wider font-bold text-zinc-400 dark:text-zinc-500">
                ${state.steps.map((s, idx) => `
                  <span class="${idx === (step - 1) ? 'text-zinc-900 dark:text-white' : ''}">${s}</span>
                `).join('')}
              </div>
            </div>
        `;

        if (step === 1) {
          layoutHtml += injectStepInfoForm();
        } else if (step === 2) {
          layoutHtml += injectStepPhotoCapture();
        } else if (step === 3) {
          layoutHtml += injectStepOtpVerification();
        } else if (step === 4) {
          layoutHtml += injectStepPaymentTerminal();
        } else if (step === 5) {
          layoutHtml += injectStepDoneSuccess();
        }

        layoutHtml += `</main>`;
        container.innerHTML = layoutHtml;

        initThemeEngine();
        
        if (step === 2 && state.isCameraActive && !state.formData.capturedPhoto) {
          startLiveCameraDevice();
        }
      }

      function injectStepInfoForm() {
        return `
          <div class="w-full text-left space-y-6">
            <h1 class="text-3xl font-black tracking-tight text-zinc-900 dark:text-white">Tell us about you</h1>
            <form id="registration-form" class="space-y-4" onsubmit="event.preventDefault(); setStudentStep(2);">
              
              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Full Name</label>
                <input type="text" value="${state.formData.fullName}" oninput="updateField('fullName', this.value)" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all" required />
              </div>

              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Email</label>
                <input type="email" value="${state.formData.email}" oninput="updateField('email', this.value)" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all" required />
              </div>

              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Password</label>
                <input type="password" value="${state.formData.password}" oninput="updateField('password', this.value)" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all" required />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Department</label>
                  <input type="text" value="${state.formData.department}" oninput="updateField('department', this.value)" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all" required />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Year</label>
                  <select onchange="updateField('year', this.value); renderApp();" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2371717a%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.65rem_auto] bg-[right_1rem_center] bg-no-repeat">
                    <option value="1st" ${state.formData.year === '1st' ? 'selected' : ''}>1st</option>
                    <option value="2nd" ${state.formData.year === '2nd' ? 'selected' : ''}>2nd</option>
                    <option value="3rd" ${state.formData.year === '3rd' ? 'selected' : ''}>3rd</option>
                    <option value="4th" ${state.formData.year === '4th' ? 'selected' : ''}>4th</option>
                  </select>
                </div>
              </div>

              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Your Phone</label>
                <input type="tel" value="${state.formData.yourPhone}" oninput="updateField('yourPhone', this.value)" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all" required />
              </div>

              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Parent Phone</label>
                <input type="tel" value="${state.formData.parentPhone}" oninput="updateField('parentPhone', this.value)" class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-white text-zinc-900 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all" required />
              </div>

              <div class="space-y-2 pt-2">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">Diet Preference</label>
                <div class="grid grid-cols-2 gap-4">
                  <button type="button" onclick="updateField('dietPreference', 'Veg'); renderApp();" class="flex items-center justify-center gap-2 py-3.5 px-6 rounded-xl font-bold transition-all active:scale-98 ${
                    state.formData.dietPreference === 'Veg' 
                      ? 'bg-brand text-white border border-brand shadow-md shadow-brand/20' 
                      : 'border border-zinc-200 bg-white text-zinc-700 hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-zinc-300 dark:hover:bg-zinc-800'
                  }">
                    <span>Veg</span>
                  </button>
                  <button type="button" onclick="updateField('dietPreference', 'Non-Veg'); renderApp();" class="flex items-center justify-center gap-2 py-3.5 px-6 rounded-xl font-bold transition-all active:scale-98 ${
                    state.formData.dietPreference === 'Non-Veg' 
                      ? 'bg-brand text-white border border-brand shadow-md shadow-brand/20' 
                      : 'border border-zinc-200 bg-white text-zinc-700 hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-800/40 dark:text-zinc-300 dark:hover:bg-zinc-800'
                  }">
                    <span>Non-Veg</span>
                  </button>
                </div>
              </div>

              <div class="pt-4">
                <button type="submit" class="w-full flex items-center justify-center gap-2 font-bold py-4 px-6 rounded-xl bg-brand hover:bg-brand-hover text-white transition-all shadow-lg transform active:scale-[0.99]">
                  <span>Continue &rarr;</span>
                </button>
              </div>
            </form>
          </div>
        `;
      }

      function injectStepPhotoCapture() {
        const targetPhoto = state.formData.capturedPhoto;
        return `
          <div class="w-full text-center space-y-6">
            <div class="text-left space-y-1">
              <h1 class="text-3xl font-black tracking-tight text-zinc-900 dark:text-white">Capture your photo</h1>
              <p class="text-xs text-zinc-400 dark:text-zinc-500">Used on your virtual ID. We compress it locally.</p>
            </div>

            <div class="w-full aspect-square max-w-[340px] mx-auto rounded-2xl border-2 border-dashed border-zinc-200 dark:border-zinc-800 bg-[#F4F1EC] dark:bg-zinc-900/40 flex flex-col items-center justify-center relative overflow-hidden">
              ${targetPhoto ? `
                <img src="${targetPhoto}" class="absolute inset-0 w-full h-full object-cover" alt="Student Profile Preview" />
              ` : state.isCameraActive ? `
                <video id="webcam-preview" autoplay playsinline class="absolute inset-0 w-full h-full object-cover transform -scale-x-100"></video>
                <div id="camera-loading-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-zinc-500 text-xs gap-2 bg-zinc-950 text-white">
                  <span>Connecting live camera access feed...</span>
                </div>
              ` : `
                <div class="p-6 text-center space-y-2 text-zinc-400 dark:text-zinc-500">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor" class="w-12 h-12 mx-auto opacity-40">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
                  </svg>
                </div>
              `}
            </div>

            <canvas id="photo-canvas" class="hidden" width="600" height="600"></canvas>
            <input type="file" id="browser-file-input" accept="image/*" class="hidden" onchange="handleFileBrowsingSelection(event)" />

            <div class="space-y-3 max-w-[340px] mx-auto pt-1">
              ${targetPhoto ? `
                <button onclick="retakePhotoStream()" class="w-full font-bold py-3 px-6 rounded-xl bg-brand hover:bg-brand-hover text-white transition-all shadow-md">
                  <span>Retake photo</span>
                </button>
              ` : state.isCameraActive ? `
                <button onclick="capturePhotoFromStream()" class="w-full font-bold py-3.5 px-6 rounded-xl bg-zinc-900 hover:bg-zinc-800 text-white dark:bg-white dark:text-zinc-900 transition-all">
                  <span>Capture Snapshot</span>
                </button>
                <button onclick="cancelCameraMode()" class="w-full text-xs font-semibold text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 py-1 transition-all">
                  Cancel Camera
                </button>
              ` : `
                <button onclick="activateCameraInterface()" class="w-full font-bold py-3 px-6 rounded-xl bg-brand hover:bg-brand-hover text-white transition-all shadow-md">
                  <span>Take photo / Upload (Live Camera)</span>
                </button>
                <button onclick="triggerBrowserFileQuery()" class="w-full font-bold py-3 px-6 rounded-xl bg-zinc-200 dark:bg-zinc-800 text-zinc-800 dark:text-zinc-200 hover:bg-zinc-300 dark:hover:bg-zinc-700 transition-all">
                  <span>Upload From Browser / Storage</span>
                </button>
              `}

              <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="setStudentStep(1)" class="w-full font-bold py-3 px-6 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 transition-all">
                  Back
                </button>
                <button onclick="setStudentStep(3)" ${!targetPhoto ? 'disabled' : ''} class="w-full flex items-center justify-center gap-2 font-bold py-3 px-6 rounded-xl transition-all ${
                  targetPhoto 
                    ? 'bg-brand hover:bg-brand-hover text-white cursor-pointer shadow-md' 
                    : 'bg-brand/40 text-white/70 cursor-not-allowed'
                }">
                  <span>Continue &rarr;</span>
                </button>
              </div>
            </div>
          </div>
        `;
      }

      function injectStepOtpVerification() {
        return `
          <div class="w-full text-center space-y-6">
            <div class="text-left space-y-1">
              <h1 class="text-3xl font-black tracking-tight text-zinc-900 dark:text-white">Verify phones</h1>
            </div>

            <div class="bg-[#F4F1EC] dark:bg-zinc-800/60 p-4 rounded-xl text-left border border-zinc-200/40">
              <span class="text-[10px] font-bold tracking-wider text-zinc-400 block uppercase mb-1">DEMO MODE</span>
              <p class="text-xs text-zinc-500 dark:text-zinc-400">Enter <strong class="text-zinc-900 dark:text-white">123456</strong> for both OTPs.</p>
            </div>

            <div class="space-y-4 text-left">
              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">OTP SENT TO A</label>
                <input type="text" id="otpYourPhone" maxlength="6" placeholder="1 2 3 4 5 6" value="${state.formData.otpYourPhone}" oninput="handleOtpInput('otpYourPhone', this)" class="w-full px-4 py-3 text-center tracking-[0.6em] font-mono text-xl rounded-xl border border-zinc-200 bg-white dark:border-zinc-800 dark:bg-zinc-800/40 focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand" />
              </div>

              <div class="space-y-1.5">
                <label class="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 block">OTP SENT TO A</label>
                <input type="text" id="otpParentPhone" maxlength="6" placeholder="1 2 3 4 5 6" value="${state.formData.otpParentPhone}" oninput="handleOtpInput('otpParentPhone', this)" class="w-full px-4 py-3 text-center tracking-[0.6em] font-mono text-xl rounded-xl border border-zinc-200 bg-white dark:border-zinc-800 dark:bg-zinc-800/40 focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand" />
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
              <button onclick="setStudentStep(2)" class="w-full font-bold py-3 px-6 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 transition-all">
                Back
              </button>
              <button id="otp-submit-btn" disabled onclick="verifyOtpAndAdvance()" class="w-full flex items-center justify-center gap-2 font-bold py-3 px-6 rounded-xl transition-all bg-brand/40 text-white/70 cursor-not-allowed">
                <span>Continue &rarr;</span>
              </button>
            </div>
          </div>
        `;
      }

      function injectStepPaymentTerminal() {
        return `
          <div class="w-full text-center space-y-6">
            <div class="text-left space-y-1">
              <h1 class="text-3xl font-black tracking-tight text-zinc-900 dark:text-white">Payment</h1>
            </div>

            <div class="bg-brand text-white p-8 rounded-2xl text-left space-y-4 shadow-xl shadow-brand/10 relative overflow-hidden">
              <div class="space-y-1">
                <span class="text-[10px] font-bold tracking-widest uppercase text-white/70 block">MONTHLY MESS FEE</span>
                <div class="text-5xl font-black tracking-tight">₹3,500</div>
              </div>
              <p class="text-xs text-white/80">Demo mode: payment auto-succeeds.</p>
            </div>

            <div class="pt-4 space-y-3">
              <button onclick="triggerSuccessfulFinalizationSequence()" class="w-full flex items-center justify-center gap-2 font-bold py-4 px-6 rounded-xl bg-zinc-900 text-white hover:bg-zinc-800 dark:bg-white dark:text-zinc-900 dark:hover:bg-zinc-100 transition-all shadow-md active:scale-[0.99]">
                <span>Pay & Complete Registration</span>
              </button>
              <button onclick="setStudentStep(3)" class="text-xs font-semibold text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 block mx-auto transition-all">
                Back
              </button>
            </div>
          </div>
        `;
      }

      function injectStepDoneSuccess() {
        return `
          <div class="w-full text-center space-y-6 py-4">
            <div class="w-16 h-16 bg-zinc-100 dark:bg-zinc-800 rounded-full border border-zinc-200 dark:border-zinc-700 flex items-center justify-center mx-auto text-emerald-600 dark:text-emerald-400 shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
              </svg>
            </div>

            <div class="space-y-4">
              <h1 class="text-4xl font-black tracking-tight text-zinc-900 dark:text-white">You're in!</h1>
              
              <div class="space-y-1 pt-2">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wider">Your index number is</p>
                <div class="bg-[#F4F1EC] dark:bg-zinc-800 text-zinc-800 dark:text-zinc-100 text-xl font-bold py-4 px-8 rounded-xl max-w-sm mx-auto tracking-widest border border-zinc-200/40 font-mono">
                  ${state.generatedIndexNumber}
                </div>
              </div>

              <p class="text-sm text-zinc-500 dark:text-zinc-400 max-w-md mx-auto pt-2">
                Welcome aboard, <span class="font-bold text-zinc-800 dark:text-white">${state.formData.fullName || 'Student'}</span>! Your registration application has cleared checks successfully.
              </p>
            </div>

            <div class="pt-6 max-w-sm mx-auto">
              <button onclick="navigateToDashboardFile()" class="w-full font-bold flex items-center justify-center gap-2 py-3.5 px-6 rounded-xl bg-brand hover:bg-brand-hover text-white shadow-md transition-all">
                <span>Open Student Dashboard &rarr;</span>
              </button>
            </div>
          </div>
        `;
      }

      // --- ENHANCED PHOTO CAPTURE & BROWSER PIPELINES ---
      function activateCameraInterface() {
        state.isCameraActive = true;
        renderApp();
      }

      function cancelCameraMode() {
        stopActiveCameraStreams();
        state.isCameraActive = false;
        renderApp();
      }

      function triggerBrowserFileQuery() {
        const fileInput = document.getElementById('browser-file-input');
        if (fileInput) fileInput.click();
      }

      function handleFileBrowsingSelection(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            state.formData.capturedPhoto = e.target.result; // DataURI sets preview image
            renderApp();
          };
          reader.readAsDataURL(file);
        }
      }

      async function startLiveCameraDevice() {
        try {
          stopActiveCameraStreams();
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 600, height: 600, facingMode: "user" },
            audio: false
          });
          state.streamRef = stream;
          
          const videoContainer = document.getElementById('webcam-preview');
          const loadingMessage = document.getElementById('camera-loading-placeholder');
          
          if (videoContainer) {
            videoContainer.srcObject = stream;
            if (loadingMessage) loadingMessage.classList.add('hidden');
          }
        } catch (err) {
          console.error("Camera access issue:", err);
          state.isCameraActive = false;
          renderApp();
          alert("Camera blocked or unavailable. Please click 'Upload From Browser / Storage' instead.");
        }
      }

      function stopActiveCameraStreams() {
        if (state.streamRef) {
          state.streamRef.getTracks().forEach(track => track.stop());
          state.streamRef = null;
        }
      }

      function capturePhotoFromStream() {
        const video = document.getElementById('webcam-preview');
        const canvas = document.getElementById('photo-canvas');
        
        if (video && canvas) {
          const ctx = canvas.getContext('2d');
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1); // Mirrored natural selfie alignment 
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          state.formData.capturedPhoto = canvas.toDataURL('image/jpeg');
          
          stopActiveCameraStreams();
          state.isCameraActive = false;
          renderApp();
        }
      }

      function retakePhotoStream() {
        state.formData.capturedPhoto = null;
        state.isCameraActive = false;
        renderApp();
      }

      // --- TIMED ALERTS AND INDEX GENERATION ENGINE ---
      function generateUniqueRegistrationIndex() {
        const randomSequence = Math.floor(1000 + Math.random() * 9000); 
        return `MM-2026-${randomSequence}`;
      }

      async function triggerSuccessfulFinalizationSequence() {

  state.generatedIndexNumber = generateUniqueRegistrationIndex();

  const { error } = await supabaseClient
    .from("users")
    .insert([
      {
        full_name: state.formData.fullName,
        email: state.formData.email,
        password: state.formData.password,
        department: state.formData.department,
        year: state.formData.year,
        diet_preference: state.formData.dietPreference,
        photo_url: state.formData.capturedPhoto,
        index_number: state.generatedIndexNumber
      }
    ]);

  if (error) {
    alert(error.message);
    return;
  }

  state.studentStep = 5;
  renderApp();
}

      function setStudentStep(stepNumber) {
        if (stepNumber !== 2) {
          stopActiveCameraStreams();
        }
        state.studentStep = stepNumber;
        renderApp();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function handleNavigationBack() {
        if (state.studentStep > 1) {
          setStudentStep(state.studentStep - 1);
        } else {
          resetWholeStateToGateway();
        }
      }

      function updateField(key, value) {
        state.formData[key] = value;
      }

      function handleOtpInput(key, inputEl) {
        inputEl.value = inputEl.value.replace(/[^0-9]/g, '');
        state.formData[key] = inputEl.value;

        const isOtpComplete = state.formData.otpYourPhone.length === 6 && state.formData.otpParentPhone.length === 6;
        const submitBtn = document.getElementById('otp-submit-btn');
        
        if (submitBtn) {
          if (isOtpComplete) {
            submitBtn.removeAttribute('disabled');
            submitBtn.className = "w-full flex items-center justify-center gap-2 font-bold py-3 px-6 rounded-xl transition-all bg-brand hover:bg-brand-hover text-white cursor-pointer shadow-md";
          } else {
            submitBtn.setAttribute('disabled', 'true');
            submitBtn.className = "w-full flex items-center justify-center gap-2 font-bold py-3 px-6 rounded-xl transition-all bg-brand/40 text-white/70 cursor-not-allowed";
          }
        }
      }

      function verifyOtpAndAdvance() {
        if (state.formData.otpYourPhone === "123456" && state.formData.otpParentPhone === "123456") {
          setStudentStep(4);
        } else {
          alert("Invalid demo access credentials token code applied. Please use 123456.");
        }
      }

      function resetWholeStateToGateway() {
        stopActiveCameraStreams();
        state.studentStep = 1;
        state.isCameraActive = false;
        state.generatedIndexNumber = "";
        state.formData = {
          fullName: "", email: "", password: "", department: "", year: "1st",
          yourPhone: "", parentPhone: "", dietPreference: "Veg",
          capturedPhoto: null, otpYourPhone: "", otpParentPhone: ""
        };
        renderApp();
      }

      function initThemeEngine() {
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlElement = document.documentElement;

        if (!themeToggleBtn || !sunIcon || !moonIcon) return;

        function syncIcons() {
          if (htmlElement.classList.contains('dark')) {
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
          } else {
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
          }
        }

        syncIcons();

        themeToggleBtn.onclick = (e) => {
          e.preventDefault();
          htmlElement.classList.toggle('dark');
          syncIcons();
        };
      }

      document.addEventListener('DOMContentLoaded', renderApp);
    </script>
    <script>
    function navigateToDashboardFile() {
      // Grab individual element values by their IDs from your registration form
      const studentProfile = {
        fullName: document.getElementById('fullName')?.value || 'Guest Student',
        department: document.getElementById('department')?.value || 'Computer Engg',
        year: document.getElementById('year')?.value || '3rd Year',
        dietPreference: document.querySelector('input[name="diet"]:checked')?.value || 'Veg',
        indexNumber: 'MM-2026-' + Math.floor(1000 + Math.random() * 9000)
      };

      // Save the form state object locally in the browser
      localStorage.setItem('activeStudentProfile', JSON.stringify(studentProfile));

      // If your code uses a camera capture feature, save the image variable here too
      if (typeof state !== 'undefined' && state.formData && state.formData.capturedPhoto) {
        localStorage.setItem('messmate_avatar', state.formData.capturedPhoto);
      }

      // Safely forward the browser window over to your dashboard file
      window.location.href = 'dashboard.html';
    }
    </script>
